syntax = "proto3";

package banking.v1;

// AllocationsService — distribution of company and user capital inside the bank and
// across external services.
//
// An allocation has one owner (the "owned" party) and a sharers list (the "shared"
// list); a user-sharer may revoke only while the fund (piggybank) owns it. Moves are
// cross-boundary sagas over TigerBeetle two-phase transfers. Amounts are decimal
// USDT strings. The user-facing RPCs here act on the caller's own access-token
// `sub`; service-side reservation/settlement RPCs land in a follow-up. See
// docs/ARCHITECTURE.md.
service AllocationsService {
  // The calling user directs part of their balance at a fund service/strategy.
  rpc Allocate(AllocateRequest) returns (Allocation);

  // The calling user revokes their own stake — permitted only while the fund owns
  // the allocation (the domain rule). Idempotent.
  rpc RevokeAllocation(RevokeAllocationRequest) returns (Allocation);

  // The calling user's allocations, newest first.
  rpc ListAllocations(ListAllocationsRequest) returns (AllocationList);
}

message AllocateRequest {
  string service = 1;  // the service/strategy to allocate to
  string network = 2;  // bep20 | trc20 | ton
  string amount = 3;   // decimal USDT
}

message RevokeAllocationRequest {
  string allocation_id = 1;
}

message ListAllocationsRequest {}

// A party in an allocation's owner/sharer roles. `kind` ∈ {piggybank, user,
// service}; `id` is the user UUID or service id (empty for piggybank).
message Sharer {
  string kind = 1;
  string id = 2;
}

message Allocation {
  string id = 1;
  string amount = 2;       // decimal USDT
  string network = 3;      // bep20 | trc20 | ton
  string owner_kind = 4;   // piggybank | user | service
  string owner_id = 5;
  repeated Sharer sharers = 6;
  string kind = 7;         // user_stake | service_reservation | service_holding
  string service = 8;      // the service the allocation involves
  string state = 9;        // pending | active | revoked | cancelled
}

message AllocationList {
  repeated Allocation allocations = 1;
}
