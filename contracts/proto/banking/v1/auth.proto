syntax = "proto3";

package banking.v1;

// AuthService — the hub's token issuance and authorization surface.
//
// Issues first-party asymmetric JWTs (after Google OAuth2 sign-in), rotates
// refresh tokens, and publishes verification keys. Services do NOT call this per
// request: they verify access tokens locally against cached JWKS via the shared
// `evbanking_auth` flow (no round trip, no per-service token storage).
//
// Scaffold: the service is declared to lock the namespace; RPCs (e.g. Exchange,
// Refresh, Jwks, Introspect) land here as the auth feature arrives. See
// docs/ARCHITECTURE.md.
service AuthService {}
