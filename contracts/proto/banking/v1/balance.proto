syntax = "proto3";

package banking.v1;

import "banking/v1/funds.proto";

// BalanceService — the bank's treasury and company capital (operator surface).
//
// Reads authoritative balances from the TigerBeetle ledger; metadata and events from
// Postgres. Every amount is a decimal USDT STRING (proto3 has no u128; a string is
// lossless and matches proto-loader's `longs: String`). All RPCs are admin-gated
// (allowlist) at the boundary. See docs/ARCHITECTURE.md.
service BalanceService {
  // The treasury: per-rail on-chain liquidity (Layer 2) and the claims it backs
  // (Layer 1), read live from TigerBeetle (Read-First).
  rpc GetTreasury(GetTreasuryRequest) returns (Treasury);

  // Inject the company's own capital onto a rail (Dr WALLET / Cr FUND).
  rpc SeedCapital(SeedCapitalRequest) returns (SeedCapitalResponse);

  // Record a settled on-chain deposit, crediting a party's claim. Idempotent by
  // `tx_ref` — recording the same chain tx twice credits once.
  rpc RecordDeposit(RecordDepositRequest) returns (RecordDepositResponse);

  // Dispatch a queued withdrawal to custody once its rail has liquidity (the treasury
  // worker). Stands in for an automated rebalance/top-up trigger. Idempotent.
  rpc DispatchWithdrawal(DispatchWithdrawalRequest) returns (DispatchWithdrawalResponse);

  // Settle a user withdrawal once it has the required on-chain confirmations: posts the
  // reservation and moves the net out of custody. `tx_ref` is the chain transaction.
  // Stands in for a chain watcher + custody confirmation callback. Idempotent.
  rpc SettleWithdrawal(SettleWithdrawalRequest) returns (SettleWithdrawalResponse);

  // Fail a processing user withdrawal that never reached the chain: voids the
  // reservation, refunding the user. NEVER call this if the broadcast may have landed
  // on-chain — that would double-pay. Idempotent.
  rpc FailWithdrawal(FailWithdrawalRequest) returns (FailWithdrawalResponse);

  // Post a fund's total AUM; NAV is derived = AUM / units_outstanding (units read live
  // from TigerBeetle). Rejects zero units and, unless `override` is set, a NAV move
  // beyond the safety threshold vs the last mark (the fat-finger guard on the trust seam).
  rpc PostFundValuation(PostFundValuationRequest) returns (FundNav);

  // Settle a queued fund redemption once the fund's claim is liquid (the treasury
  // worker): prices at the settle-time NAV and pays the cash. Idempotent.
  rpc SettleRedemption(SettleRedemptionRequest) returns (Redemption);

  // Fail a queued fund redemption (operator): voids the reserved burn, returning the
  // user's units. Idempotent.
  rpc FailRedemption(FailRedemptionRequest) returns (Redemption);

  // Operator (RedemptionSettle): the cross-user queue of redemptions awaiting settle,
  // oldest first — the "Valuation & redemptions" screen's clear-the-queue surface.
  // (Est. cash = units × current NAV is computed client-side from the posted NAV.)
  rpc ListRedemptionQueue(ListRedemptionQueueRequest) returns (RedemptionQueue);

  // Operator (TreasuryRead): the money-plane operations mode (the read-only kill-switch).
  rpc GetOperationsMode(GetOperationsModeRequest) returns (OperationsMode);

  // Admin (OperationsManage): toggle read-only mode. When on, every user money mutation
  // (withdraw / subscribe / redeem) is rejected — "pause deposits & withdrawals".
  rpc SetOperationsMode(SetOperationsModeRequest) returns (OperationsMode);
}

message ListRedemptionQueueRequest {}

// One queued redemption for the operator queue. `email` is the mirrored identity email
// (may be empty if the bridge hasn't populated it). `created_at` is unix seconds.
message RedemptionQueueItem {
  string redemption_id = 1;
  string user_id = 2;
  string email = 3;
  string service = 4;
  string units = 5;
  int64 created_at = 6;
}

message RedemptionQueue {
  repeated RedemptionQueueItem items = 1;
}

message GetOperationsModeRequest {}

message OperationsMode {
  bool read_only = 1;
}

message SetOperationsModeRequest {
  bool read_only = 1;
}

message GetTreasuryRequest {}

// Per-rail on-chain liquidity (the treasury / Layer 2).
message RailLiquidity {
  string network = 1;  // bep20 | trc20 | ton
  string custody = 2;  // liquid on-chain USDT held in this rail's custody wallet
}

// The treasury picture: per-rail liquidity (Layer 2) and the claims it backs (Layer 1).
// Under the unified-claim model the invariant is GLOBAL — `total_custody` (the asset
// side) equals the sum of all claims — so client liabilities are the remainder beyond
// the fund's own capital and retained fees.
message Treasury {
  repeated RailLiquidity rails = 1;     // per-rail on-chain liquidity (USDT)
  string bank = 2;                      // mocked USD liquidity (separate ledger; off-ramp FX)
  string total_custody = 3;             // sum of rail custody — the asset side
  string fund_capital = 4;              // the fund's own unallocated capital
  string fee_revenue = 5;               // retained withdrawal-fee revenue
  string held_for_clients = 6;          // claims owed to users + services
  string reserved_for_withdrawals = 7;  // of held_for_clients, locked by in-flight withdrawals
}

message SeedCapitalRequest {
  string network = 1;  // bep20 | trc20 | ton — the rail the capital lands on
  string amount = 2;   // decimal USDT
}

message SeedCapitalResponse {}

message RecordDepositRequest {
  string tx_ref = 1;      // the on-chain tx reference — the idempotency key
  string network = 2;     // bep20 | trc20 | ton — the rail it arrived on
  string amount = 3;      // decimal USDT (canonical value, network-agnostic)
  // The party credited. `party_kind` ∈ {piggybank, user, service}; `party_id` is the
  // user UUID or service id (empty for piggybank, which credits the fund's capital).
  string party_kind = 4;
  string party_id = 5;
}

message RecordDepositResponse {
  bool recorded = 1;  // false if `tx_ref` was already recorded (idempotent no-op)
}

message DispatchWithdrawalRequest {
  string withdrawal_id = 1;
}

message DispatchWithdrawalResponse {}

message SettleWithdrawalRequest {
  string withdrawal_id = 1;
  string tx_ref = 2;  // the on-chain transaction reference
}

message SettleWithdrawalResponse {}

message FailWithdrawalRequest {
  string withdrawal_id = 1;
  string reason = 2;  // operator note (audit only)
}

message FailWithdrawalResponse {}

message PostFundValuationRequest {
  string service = 1;   // the fund/service id
  string aum = 2;       // decimal USDT — the fund's total assets under management
  bool override = 3;    // bypass the NAV-move safety guard (operator confirmed)
}

message SettleRedemptionRequest {
  string redemption_id = 1;
}

message FailRedemptionRequest {
  string redemption_id = 1;
}
