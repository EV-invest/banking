syntax = "proto3";

// The signer service contract — INTERNAL hub↔signer wire, deliberately kept in its
// own package (not `banking.v1`) so it stays out of the cabinet-facing OpenAPI/TS
// generation (`nix run .#gen-api` only reads `proto/banking/v1`). The signer is a
// separate trust domain: it holds the encrypted chain private keys; the hub never
// does. It exposes key provisioning and ERC-20 transfer signing — the hub fetches the
// chain params and broadcasts; the signer only ever holds keys and produces signatures.
package signer.v1;

service SignerService {
  // Provision the caller-user's key-backed deposit address on a network: generate
  // the curve keypair, seal the private key at rest, return the public address.
  // Idempotent per (user_id, network) — a repeat returns the existing address.
  rpc ProvisionAddress(ProvisionAddressRequest) returns (ProvisionAddressResponse);

  // Sign an ERC-20 `transfer(to, amount)` from a wallet the signer holds: the treasury
  // hot wallet (empty from_user_id) for a withdrawal, or a user's deposit address for a
  // sweep. The signer unseals the key, builds the legacy EIP-155 transaction, signs it,
  // and returns the raw bytes for the hub to broadcast — the key never leaves the signer.
  // Signing is deterministic (RFC-6979), so a retry with the same params yields the same
  // transaction; the hub dedupes the BROADCAST by withdrawal id.
  rpc SignErc20Transfer(SignErc20TransferRequest) returns (SignErc20TransferResponse);

  // Sign a native (BNB) value transfer from a wallet the signer holds — the gas-station
  // account topping up a user's deposit address with gas before that address's USDT is
  // swept to the treasury. The same legacy EIP-155 envelope as SignErc20Transfer but with
  // value = amount and empty calldata.
  rpc SignNativeTransfer(SignNativeTransferRequest) returns (SignNativeTransferResponse);

  // Sign a TRC20 `transfer(to, amount)` on Tron from a wallet the signer holds (treasury for a
  // withdrawal, a user's deposit address for a sweep). A Tron tx is protobuf, not RLP: the signer
  // builds the TriggerSmartContract, computes txID = sha256(raw_data), and signs it. The hub
  // fetches the recent-block reference (getnowblock) and passes it in, then broadcasts + persists
  // the returned bytes/txid before sending (Tron has no nonce — replay safety is ref-block +
  // expiration + the unique txid).
  rpc SignTrc20Transfer(SignTrc20TransferRequest) returns (SignedTronTxResponse);

  // Sign a native TRX transfer (a gas-station top-up of a deposit address before its USDT is
  // swept). The same Tron protobuf envelope as SignTrc20Transfer but a TransferContract — no
  // fee_limit (bandwidth-only).
  rpc SignTrxTransfer(SignTrxTransferRequest) returns (SignedTronTxResponse);

  // === TON region (jetton USDT) =============================================
  // Sign a TEP-74 jetton (USDT) transfer from a v4R2 wallet the signer holds: the
  // treasury (empty from_user_id) for a withdrawal, or a user's deposit wallet for a
  // sweep. The signer unseals the Ed25519 seed, derives the wallet, builds the external
  // message carrying an internal message to OUR jetton wallet (the TEP-74 transfer body),
  // signs the cell hash, and returns the BoC for the hub to POST to toncenter. On the
  // wallet's first send (seqno 0) the StateInit is attached so the wallet self-deploys.
  rpc SignJettonTransfer(SignJettonTransferRequest) returns (SignedTonTxResponse);

  // Sign a native (Toncoin) value transfer from a TON wallet the signer holds — the
  // gas-station topping up a user's wallet with TON before that wallet's USDT is swept.
  // A plain value transfer (no jetton body); self-deploys the sender on its first send.
  rpc SignTonTransfer(SignTonTransferRequest) returns (SignedTonTxResponse);

  // === KEK-epoch diagnostics & recovery ======================================
  // Walk every ACTIVE key and report the ones that are provably dead under the
  // current KEK epoch (sealed under a different KEK — their funds cannot move).
  // Read-only apart from healing pre-epoch rows' fingerprint stamps on a
  // successful probe. Complements the boot sentinel: the sentinel catches a
  // whole-database mismatch at startup; this catches per-row casualties.
  rpc GetKeyHealth(GetKeyHealthRequest) returns (GetKeyHealthResponse);

  // Supersede a PROVABLY DEAD key for (user, network): archive the old row and
  // mint a fresh keypair, returning the new derived address. Refuses to rotate a
  // key that still unseals — rotation is a recovery tool, not a re-keying tool.
  // Funds on the OLD address remain unrecoverable; this only restores the user's
  // ability to receive future deposits.
  rpc RotateAddress(RotateAddressRequest) returns (ProvisionAddressResponse);
}

message ProvisionAddressRequest {
  string user_id = 1; // UUID
  string network = 2; // "bep20" | "trc20" | "ton"
}

message ProvisionAddressResponse {
  string address = 1;
  // "placeholder" | "derived". Every supported rail now returns "derived" (the real
  // on-chain image). The hub tags the cached row with this and refuses to serve anything
  // but a derived address as a fundable deposit destination — a non-derived rail is
  // presented as unavailable instead.
  string address_kind = 2;
}

message SignErc20TransferRequest {
  // The sending wallet: a user's UUID, or EMPTY for the treasury hot wallet.
  string from_user_id = 1;
  string network = 2;        // "bep20"
  string token_contract = 3; // the ERC-20 token (e.g. USDT), 0x-hex 20-byte address
  string to_address = 4;     // recipient, 0x-hex 20-byte address
  string amount = 5;         // token base units, decimal string (fits u128)
  uint64 chain_id = 6;       // 56 = BSC mainnet, 97 = testnet
  uint64 nonce = 7;          // the sending wallet's next nonce (hub-fetched)
  string gas_price = 8;      // wei, decimal string (fits u128)
  uint64 gas_limit = 9;
}

message SignErc20TransferResponse {
  string raw_tx = 1;  // 0x-prefixed RLP-encoded signed transaction, ready to broadcast
  string tx_hash = 2; // 0x-prefixed transaction hash (keccak256 of raw_tx)
}

message SignNativeTransferRequest {
  // The sending wallet: a user's UUID, the gas-station UUID, or EMPTY for the treasury.
  string from_user_id = 1;
  string network = 2;     // "bep20"
  string to_address = 3;  // recipient, 0x-hex 20-byte address
  string amount = 4;      // native (wei) base units, decimal string (fits u128)
  uint64 chain_id = 5;    // 56 = BSC mainnet, 97 = testnet
  uint64 nonce = 6;       // the sending wallet's next nonce (hub-fetched)
  string gas_price = 7;   // wei, decimal string (fits u128)
  uint64 gas_limit = 8;   // 21000 for a plain value transfer
}

message SignNativeTransferResponse {
  string raw_tx = 1;  // 0x-prefixed RLP-encoded signed transaction, ready to broadcast
  string tx_hash = 2; // 0x-prefixed transaction hash (keccak256 of raw_tx)
}

// --- Tron (TRC20) signing ---------------------------------------------------------------------
message SignTrc20TransferRequest {
  // The sending wallet: a user's UUID, or EMPTY for the treasury hot wallet.
  string from_user_id = 1;
  string network = 2;          // "trc20"
  string token_contract = 3;   // the TRC20 token (USDT), Base58Check "T..." address
  string to_address = 4;       // recipient, Base58Check "T..." address
  string amount = 5;           // token base units (6dp), decimal string (fits u128)
  string ref_block_bytes = 6;  // hex, 2 bytes — hub-fetched from getnowblock
  string ref_block_hash = 7;   // hex, 8 bytes
  int64 expiration = 8;        // unix ms; the tx is dead after this (~head ts + 60s)
  int64 timestamp = 9;         // unix ms
  int64 fee_limit = 10;        // SUN cap for the contract call (e.g. 100_000_000 = 100 TRX)
}

message SignTrxTransferRequest {
  // The sending wallet: a user's UUID, the gas-station UUID, or EMPTY for the treasury.
  string from_user_id = 1;
  string network = 2;          // "trc20"
  string to_address = 3;       // recipient, Base58Check "T..." address
  string amount = 4;           // SUN, decimal string (fits u128)
  string ref_block_bytes = 5;  // hex, 2 bytes
  string ref_block_hash = 6;   // hex, 8 bytes
  int64 expiration = 7;        // unix ms
  int64 timestamp = 8;         // unix ms
}

message SignedTronTxResponse {
  string signed_tx = 1; // hex of the full signed Transaction protobuf (for /wallet/broadcasthex)
  string txid = 2;      // hex sha256(raw_data) — the on-chain id + idempotency key
  int64 expiration = 3; // echoed so the hub persists it for the expiry-aware re-sign
}

// === TON messages (jetton USDT) =============================================
// Kept in their own region so a parallel TRON branch's additions never overlap.

message SignJettonTransferRequest {
  // The sending wallet: a user's UUID (sweep), or EMPTY for the treasury (withdrawal).
  string from_user_id = 1;
  string network = 2;              // "ton"
  string our_jetton_wallet = 3;    // OUR sender wallet's jetton wallet (the internal-msg dest), raw/UQ
  string to_address = 4;           // recipient OWNER address (the TEP-74 `destination`), raw/UQ
  string amount = 5;               // jetton base units (6dp), decimal string (fits u128)
  string response_destination = 6; // where excess TON returns (treasury / gas station), raw/UQ
  uint64 forward_ton_amount = 7;   // nanotons forwarded to trigger the receiver notification
  uint64 msg_value = 8;            // nanotons attached to the internal message (gas budget)
  uint64 seqno = 9;                // the sending wallet's current seqno (hub-fetched)
  uint32 valid_until = 10;         // unix time the external message expires
  bool is_testnet = 11;            // reserved: address-form/network selection at the display edge
  string wallet_version = 12;      // reserved: wallet contract version (defaults to v4r2)
}

message SignTonTransferRequest {
  // The sending wallet: the gas-station UUID, a user's UUID, or EMPTY for the treasury.
  string from_user_id = 1;
  string network = 2;        // "ton"
  string to_address = 3;     // recipient address, raw/UQ
  string amount = 4;         // nanotons, decimal string (fits u128)
  uint64 seqno = 5;          // the sending wallet's current seqno (hub-fetched)
  uint32 valid_until = 6;    // unix time the external message expires
  bool is_testnet = 7;       // reserved
  string wallet_version = 8; // reserved (defaults to v4r2)
}

message SignedTonTxResponse {
  string signed_boc = 1;  // base64 BoC of the signed external message, ready to POST to toncenter
  string msg_hash = 2;    // hex cell hash of the external message — the hub's tracking id
  uint64 seqno = 3;       // the seqno this message was signed at
  uint32 valid_until = 4; // the unix expiry it was signed with
}

// === KEK-epoch diagnostics & recovery ======================================

message GetKeyHealthRequest {}

message DeadKey {
  string wallet_id = 1;  // the wallet_secrets row id
  string user_id = 2;
  string network = 3;
  string address = 4;    // the (unspendable) deposit address the dead key backs
  string created_at = 5; // when the key was sealed — dates the bad epoch
  string reason = 6;     // operator-facing: why the key is considered dead
}

message GetKeyHealthResponse {
  uint64 total_keys = 1;      // active (non-superseded) keys
  uint64 healthy_keys = 2;    // keys whose fingerprint matches the current KEK epoch
  repeated DeadKey dead_keys = 3;
  string kek_fingerprint = 4; // short hex prefix identifying the current KEK epoch
}

message RotateAddressRequest {
  string user_id = 1; // UUID
  string network = 2; // "bep20" | "trc20" | "ton"
}
